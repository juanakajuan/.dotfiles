# Enable mouse mode
set -g mouse on

# Enable OSC 52
set -g set-clipboard on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Pane navigation with Ctrl-h/j/k/l
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# --- TMUX-SENSIBLE SETTINGS ---

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Upgrade $TERM
set -g default-terminal "screen-256color"

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Status bar theme
set -g status-style "bg=#1c1c1c,fg=#a3a3a3"
set -g status-left-length 20
set -g status-right-length 40
set -g status-left "#[fg=#e5e5e5,bold] #S "
set -g status-right "#[fg=#a3a3a3]%a %b %d #[fg=#e5e5e5,bold]%I:%M %p "

set -g window-status-separator ""
set -g window-status-format "#[fg=#8c8c8c] #I #[fg=#a3a3a3]#W "
set -g window-status-current-format "#[bg=#d43f3f,fg=#f8fafc,bold] #I #W "

set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#d43f3f"
set -g message-style "bg=#2a2a2a,fg=#e5e5e5"
set -g mode-style "bg=#d43f3f,fg=#f8fafc"
